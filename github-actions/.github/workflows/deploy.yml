name: Build · Test · Deploy

# =============================================================================
# Triggers
# =============================================================================
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:          # Allow manual trigger from GitHub UI

# Cancel in-progress runs for the same branch (saves minutes on rapid pushes)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# =============================================================================
# Environment variables shared across jobs
# =============================================================================
env:
  DOTNET_VERSION: '8.0.x'
  SOLUTION_PATH: 'ExpenseTracker.sln'
  API_PROJECT: 'src/ExpenseTracker.API/ExpenseTracker.API.csproj'
  PUBLISH_DIR: '${{ github.workspace }}/.publish'

# =============================================================================
# Jobs
# =============================================================================
jobs:

  # ---------------------------------------------------------------------------
  # JOB 1 — Build
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build (Release)
        run: |
          dotnet build ${{ env.SOLUTION_PATH }} \
            --configuration Release \
            --no-restore \
            /p:TreatWarningsAsErrors=true

      - name: Publish API
        run: |
          dotnet publish ${{ env.API_PROJECT }} \
            --configuration Release \
            --no-build \
            --output ${{ env.PUBLISH_DIR }}

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-publish
          path: ${{ env.PUBLISH_DIR }}
          retention-days: 3

  # ---------------------------------------------------------------------------
  # JOB 2 — Test
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Run tests with coverage
        run: |
          dotnet test ${{ env.SOLUTION_PATH }} \
            --configuration Release \
            --no-restore \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./test-results \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: .NET Test Results
          path: test-results/**/*.trx
          reporter: dotnet-trx
          fail-on-error: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: test-results/**/coverage.cobertura.xml
          retention-days: 7

  # ---------------------------------------------------------------------------
  # JOB 3 — Deploy  (only on push to main, not on PRs)
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: production
      url: ${{ steps.get-webapp-url.outputs.webapp-url }}

    steps:
      - name: Download publish artifact
        uses: actions/download-artifact@v4
        with:
          name: api-publish
          path: ${{ env.PUBLISH_DIR }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.PUBLISH_DIR }}

      - name: Get Web App URL
        id: get-webapp-url
        run: |
          echo "webapp-url=https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net" \
            >> "$GITHUB_OUTPUT"

      - name: Verify health check
        run: |
          BASE_URL="https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net"
          echo "Waiting for app to become healthy at ${BASE_URL}/health ..."
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${BASE_URL}/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt ${i})"
              exit 0
            fi
            echo "Attempt ${i}: got ${STATUS}, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 12 attempts"
          exit 1

      - name: Summary
        run: |
          echo "### Deployment Successful! :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Resource | URL |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-----|" >> "$GITHUB_STEP_SUMMARY"
          echo "| API Base | https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Swagger  | https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net/swagger |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Health   | https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net/health |" >> "$GITHUB_STEP_SUMMARY"
